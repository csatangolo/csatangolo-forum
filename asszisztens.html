<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fórum Asszisztens – Csatangoló Fórum</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav class="topbar">
  <a href="index.html" class="brand">Csatangoló Fórum</a>
  <div class="navlinks">
    <a href="index.html">Főoldal</a>
    <a href="program.html">Program</a>
    <a href="regisztracio.html">Regisztráció</a>
  </div>
</nav>

<main class="page narrow">
  <section class="hero small">
    <div class="badge">Alap asszisztens</div>
    <h1>Miben segíthetünk?</h1>
    <p class="motto">Gyors válaszok a legfontosabb kérdésekre</p>
  </section>

  <section class="card">
    <h2>Kérdezz a fórumról</h2>
    <div class="assistant-box">
      <input id="assistantInput" type="search" placeholder="Pl. hol lesz, mikor kezdődik, lehet-e gyerekkel jönni?">
      <button id="assistantAsk" class="button">Kérdezek</button>
    </div>
    <div id="assistantAnswer" class="assistant-answer">
      Írj be egy kérdést, vagy válassz az alábbi gyors kérdésekből.
    </div>
    <div class="quick-question-list">
      <button data-q="Mikor kezdődik?">Mikor kezdődik?</button>
      <button data-q="Hol lesz?">Hol lesz?</button>
      <button data-q="Mennyi a hozzájárulás?">Mennyi a hozzájárulás?</button>
      <button data-q="Lehet gyerekkel jönni?">Lehet gyerekkel jönni?</button>
      <button data-q="Rossz idő esetén is lesz?">Rossz idő esetén is lesz?</button>
      <button data-q="Hol tudok regisztrálni?">Hol tudok regisztrálni?</button>
    </div>
  </section>
</main>

<script src="asszisztens.js"></script>
</body>
</html>
