<!doctype html><html lang="hu"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Élményfeltöltés – Csatangoló Fórum</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="premium-3.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body><main class="p3-section"><div class="p3-panel"><span class="p3-eyebrow">Élményfeltöltés</span><h1>Oszd meg velünk a fórum pillanatait</h1><p>A feltöltött képek és videók nem kerülnek automatikusan nyilvánosságra, először csak a szervezőkhöz érkeznek be.</p><form id="mediaUploadForm" class="form"><label>Neved vagy beceneved<input name="uploader_name"></label><label>Megjegyzés<textarea name="note" rows="3"></textarea></label><label>Kép vagy videó<input name="file" type="file" accept="image/*,video/*" required></label><label class="check"><input type="checkbox" name="consent" required> Hozzájárulok, hogy a szervezők a feltöltött anyagot megtekintsék.</label><button class="p3-button" type="submit">Feltöltés elküldése</button><div id="uploadMessage" class="form-message"></div></form><p><a href="index.html">Vissza a főoldalra</a></p></div></main><script src="feltoltes.js"></script></body></html>
