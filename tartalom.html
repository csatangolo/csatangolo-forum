<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tartalomkezelő – Csatangoló Fórum</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<nav class="topbar">
  <a href="szervezo.html" class="brand">Csatangoló Tartalomkezelő</a>
  <div class="navlinks">
    <a href="szervezo.html">Irányítópult</a>
    <a href="index.html">Főoldal</a>
  </div>
</nav>
<main class="page">
  <section class="hero small">
    <div class="badge">Tartalomkezelő</div>
    <h1>Feltöltős oldalak</h1>
    <p class="motto">Előadók • Program • YouTube videók • Hírek • Támogatók</p>
  </section>

  <section id="loginBox" class="card">
    <h2>Szervezői belépés</h2>
    <label>Szervezői kód <input id="adminCode" type="password" placeholder="Írd be a szervezői kódot"></label>
    <button id="loginButton" class="button">Belépés</button>
    <div id="loginMessage" class="form-message"></div>
  </section>

  <section id="cmsContent" class="hidden">
    <section class="cms-tabs">
      <button class="tab active" data-tab="speakers">Előadók</button>
      <button class="tab" data-tab="program">Program</button>
      <button class="tab" data-tab="videos">Videók</button>
      <button class="tab" data-tab="news">Hírek</button>
      <button class="tab" data-tab="sponsors">Támogatók</button>
    </section>

    <section id="speakers" class="cms-panel active">
      <div class="card">
        <h2>Új előadó hozzáadása</h2>
        <form id="speakerForm" class="form compact-form">
          <label>Név *<input name="name" required></label>
          <label>Rövid megnevezés<input name="subtitle" placeholder="pl. Belovaglás • Lókiképzés"></label>
          <label>Bemutatkozás<textarea name="bio" rows="4"></textarea></label>
          <label>Téma<textarea name="topic" rows="2"></textarea></label>
          <label>Kép URL<input name="image_url" placeholder="https://..."></label>
          <label>Sorrend<input name="sort_order" type="number" value="100"></label>
          <label class="check"><input type="checkbox" name="is_featured"> Kiemelt előadó</label>
          <label class="check"><input type="checkbox" name="is_published" checked> Publikus</label>
          <button class="button" type="submit">Előadó mentése</button>
        </form>
      </div>
      <div id="speakerAdminList" class="cms-list"></div>
    </section>

    <section id="program" class="cms-panel">
      <div class="card">
        <h2>Új programpont</h2>
        <form id="programForm" class="form compact-form">
          <label>Időpont / időszak *<input name="time_label" required placeholder="09:00 vagy Délelőtt"></label>
          <label>Cím *<input name="title" required></label>
          <label>Leírás<textarea name="description" rows="3"></textarea></label>
          <label>Sorrend<input name="sort_order" type="number" value="100"></label>
          <label class="check"><input type="checkbox" name="is_published" checked> Publikus</label>
          <button class="button" type="submit">Programpont mentése</button>
        </form>
      </div>
      <div id="programAdminList" class="cms-list"></div>
    </section>

    <section id="videos" class="cms-panel">
      <div class="card">
        <h2>YouTube videó hozzáadása</h2>
        <form id="videoForm" class="form compact-form">
          <label>Cím *<input name="title" required></label>
          <label>YouTube link *<input name="youtube_url" required placeholder="https://www.youtube.com/watch?v=..."></label>
          <label>Leírás<textarea name="description" rows="3"></textarea></label>
          <label>Kategória<input name="category" placeholder="pl. Belovaglás"></label>
          <label>Sorrend<input name="sort_order" type="number" value="100"></label>
          <label class="check"><input type="checkbox" name="is_published" checked> Publikus</label>
          <button class="button" type="submit">Videó mentése</button>
        </form>
      </div>
      <div id="videoAdminList" class="cms-list"></div>
    </section>

    <section id="news" class="cms-panel">
      <div class="card">
        <h2>Új hír</h2>
        <form id="newsForm" class="form compact-form">
          <label>Cím *<input name="title" required></label>
          <label>Szöveg<textarea name="body" rows="5"></textarea></label>
          <label class="check"><input type="checkbox" name="is_published" checked> Publikus</label>
          <button class="button" type="submit">Hír mentése</button>
        </form>
      </div>
      <div id="newsAdminList" class="cms-list"></div>
    </section>

    <section id="sponsors" class="cms-panel">
      <div class="card">
        <h2>Támogató / partner hozzáadása</h2>
        <form id="sponsorForm" class="form compact-form">
          <label>Név *<input name="name" required></label>
          <label>Logó URL<input name="logo_url" placeholder="https://..."></label>
          <label>Weboldal<input name="website_url" placeholder="https://..."></label>
          <label>Sorrend<input name="sort_order" type="number" value="100"></label>
          <label class="check"><input type="checkbox" name="is_published" checked> Publikus</label>
          <button class="button" type="submit">Támogató mentése</button>
        </form>
      </div>
      <div id="sponsorAdminList" class="cms-list"></div>
    </section>
  </section>
</main>
<script src="cms.js"></script>
</body>
</html>
