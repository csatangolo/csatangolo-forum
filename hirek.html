<script id="topbar-mobile-menu-fixed">
(function(){
  function initTopbarMobileMenu(){
    document.querySelectorAll('.topbar.site-nav-final, .topbar').forEach(function(nav){
      if(nav.closest('.forum33')) return;
      var btn = nav.querySelector('.topbar-menu-toggle');
      var menu = nav.querySelector('.navlinks');
      if(!btn || !menu || btn.dataset.ready === '1') return;
      btn.dataset.ready = '1';

      function setOpen(open){
        nav.classList.toggle('is-menu-open', open);
        btn.classList.toggle('is-open', open);
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        btn.setAttribute('aria-label', open ? 'Menü bezárása' : 'Menü megnyitása');
      }

      btn.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        setOpen(!nav.classList.contains('is-menu-open'));
      });

      menu.addEventListener('click', function(e){
        if(e.target && e.target.closest && e.target.closest('a')) setOpen(false);
      });

      document.addEventListener('click', function(e){
        if(!nav.contains(e.target) && e.target !== btn) setOpen(false);
      });

      document.addEventListener('keydown', function(e){
        if(e.key === 'Escape') setOpen(false);
      });

      window.addEventListener('resize', function(){
        if(window.innerWidth > 900) setOpen(false);
      });
    });
  }

  document.addEventListener('DOMContentLoaded', initTopbarMobileMenu);
  window.addEventListener('load', initTopbarMobileMenu);
  setTimeout(initTopbarMobileMenu, 300);
})();
</script>

</body>
